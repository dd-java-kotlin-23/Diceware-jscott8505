<!DOCTYPE html>
<html
    xmlns:th="http://www.thymeleaf.org"
    lang="en">

<head>
  <meta charset="UTF-8">
  <title>Random Passphrase</title>
</head>

<body>

<form method = "get">
  <label for="length">Length:</label>
  <input
    id="length"
    name="length"
    type="text"
    th:value="${length}">
  <button type="submit">Submit</button>
</form>

<ul>
  <li
      th:each="word : ${words}"
      th:text="${word}"></li>
</ul>

</body>

</html>
